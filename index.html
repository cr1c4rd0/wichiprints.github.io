<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wichi Prints – Impresión 3D</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ── HEADER + NAV ── -->
    <header class="site-header fixed-top shadow-sm">

        <!-- Top bar: logo + desktop nav + hamburger -->
        <div class="header-top">
            <div class="container-fluid px-4 py-2 d-flex align-items-center gap-2">
                <div class="logo-wrap flex-shrink-0">
                    <img src="images/marca/LogoHorizontal.png" alt="Wichi Prints">
                </div>

                <!-- Desktop nav (inline) -->
                <ul class="cat-nav-list d-none d-sm-flex mb-0 ms-auto">
                    <li><button class="cat-nav-btn active" data-cat="all"          onclick="filterCards('all', this)">Todos</button></li>
                    <li><button class="cat-nav-btn"        data-cat="pokemon"       onclick="filterCards('pokemon', this)">Pokeball</button></li>
                    <li><button class="cat-nav-btn"        data-cat="chibi"         onclick="filterCards('chibi', this)">Chibi</button></li>
                    <li><button class="cat-nav-btn"        data-cat="personalizado" onclick="filterCards('personalizado', this)">Personalizado</button></li>
                </ul>

                <!-- Hamburger (mobile) -->
                <button class="nav-toggle d-sm-none ms-auto" onclick="toggleNav(this)" aria-label="Menú">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>

        <!-- Search bar -->
        <div class="header-search">
            <div class="container-fluid px-4 py-2">
                <div class="search-wrap">
                    <i class="fas fa-search search-icon"></i>
                    <input type="search" id="searchInput" class="search-input"
                        placeholder="Buscar producto..." oninput="searchProducts(this.value)" autocomplete="off">
                </div>
            </div>
        </div>

        <!-- Mobile dropdown nav -->
        <nav class="cat-nav" id="catNav">
            <div class="container-fluid px-4">
                <ul class="cat-nav-list">
                    <li><button class="cat-nav-btn" data-cat="all"          onclick="filterCards('all', this)">Todos</button></li>
                    <li><button class="cat-nav-btn" data-cat="pokemon"       onclick="filterCards('pokemon', this)">Pokeball</button></li>
                    <li><button class="cat-nav-btn" data-cat="chibi"         onclick="filterCards('chibi', this)">Chibi</button></li>
                    <li><button class="cat-nav-btn" data-cat="personalizado" onclick="filterCards('personalizado', this)">Personalizado</button></li>
                </ul>
            </div>
        </nav>

    </header>

    <!-- ── HERO ── -->
    <section class="hero">
        <div class="container">
            <h1 class="mb-2">Catálogo <span class="gradient-text">Wichi Prints</span></h1>
            <p class="mb-0">Objetos únicos impresos en 3D. Elige tu producto, indica la cantidad y escríbenos por WhatsApp.</p>
        </div>
    </section>

    <!-- ── CATALOG GRID ── -->
    <div class="container-xl px-4 pb-5">
        <div class="row g-4 py-3" id="catalogGrid"></div>
    </div>

    <!-- ── PRODUCT MODAL (Bootstrap 5) ── -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">

                <!-- Gallery -->
                <div class="gallery" id="modalGallery"></div>

                <!-- Body -->
                <div class="modal-body p-4">
                    <span class="badge bg-secondary mb-2" id="modalTag"></span>
                    <h4 class="fw-bold mb-2" id="modalTitle"></h4>
                    <p class="text-muted" id="modalDesc"></p>
                    <div id="modalPrice" class="modal-price d-none mb-3"></div>

                    <label class="form-label fw-bold" for="qtyInput">Cantidad</label>
                    <div class="qty-wrap mb-4">
                        <button class="qty-btn" onclick="changeQty(-1)">−</button>
                        <input class="qty-input" type="number" id="qtyInput" value="1" min="1">
                        <button class="qty-btn" onclick="changeQty(1)">+</button>
                    </div>

                    <label class="form-label fw-bold" for="extraNote">Especificaciones adicionales <span
                            class="fw-normal text-muted">(opcional)</span></label>
                    <textarea class="form-control" id="extraNote" rows="3"
                        placeholder="Ej: color, tamaño, diseño personalizado..."></textarea>
                </div>

                <!-- Footer -->
                <div class="modal-footer border-0 pt-0 px-4 pb-4 gap-2">
                    <a class="btn btn-whatsapp flex-grow-1" href="#" onclick="buildWaLink(event)">
                        <i class="fab fa-whatsapp me-2"></i>Pedir por WhatsApp
                    </a>
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>

            </div>
        </div>
    </div>

    <!-- ── FLOATING WA ── -->
    <a class="wa-float"
        href="https://wa.me/573332830125?text=Hola%20Wichi%20Prints!%20%F0%9F%91%8B%20Me%20gustar%C3%ADa%20ver%20su%20cat%C3%A1logo%20de%20impresi%C3%B3n%203D."
        target="_blank" title="Escríbenos por WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- ── FOOTER ── -->
    <footer class="site-footer bg-black text-secondary text-center py-4 small">
        <p class="mb-0">
            © 2026 <strong class="text-white">Wichi Prints</strong> · Impresión 3D
        </p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App scripts (orden de dependencias) -->
    <script src="js/data/products.js"></script>
    <script src="js/modules/gallery.js"></script>
    <script src="js/modules/whatsapp.js"></script>
    <script src="js/modules/catalog.js"></script>
    <script src="js/modules/modal.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
